services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - TZ=Asia/Ho_Chi_Minh

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
      POSTGRES_DB: docmind
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Ho_Chi_Minh

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - POSTGRES_URL=postgresql+asyncpg://docmind:docmind@postgres:5432/docmind
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - qdrant
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uv run celery -A backend.app.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - POSTGRES_URL=postgresql+asyncpg://docmind:docmind@postgres:5432/docmind
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - qdrant
      - postgres
      - redis

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=docmind
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  postgres_data:
  grafana_data:
